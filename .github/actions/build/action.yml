name: Build workspace
description: Build workspace

inputs:
  docker_image:
    description: Docker image
    required: true
  workspace_path:
    description: Workspace path
    required: true
  variant:
    description: Kernel variant (default or RT)
    required: true

outputs:
  kernel_version:
    description: Kernel version built
    value: ${{ steps.get_version.outputs.kernel_version }}

runs:
  using: "composite"
  steps:
    - name: Prepare and merge config fragments
      id: merge_config
      shell: bash
      run: |
        set -euo pipefail
        echo "Variant : ${{ inputs.variant }}"
        cd "${{ inputs.workspace_path }}"
        mkdir -p ../kobj

        # Base fragment list
        FRAGMENTS=(
          arch/arm64/configs/defconfig
          arch/arm64/configs/prune.config
          arch/arm64/configs/qcom.config
          kernel/configs/debug.config
        )

        # If variant=RT, append the RT fragment
        if [[ "${{ inputs.variant }}" == "RT" || "${{ inputs.variant }}" == "rt" ]]; then
          RT_FRAG="arch/arm64/configs/rt.config"
          if [[ ! -f "$RT_FRAG" ]]; then
            echo "ERROR: RT fragment '$RT_FRAG' not found."
            exit 1
          fi
          echo "Including RT fragment: $RT_FRAG"
          FRAGMENTS+=("$RT_FRAG")
        else
          echo "Variant '${{ inputs.variant }}' -> using default fragments only."
        fi

        # Merge all fragments on top of base defconfig
        echo "Print all fragment name used for Build"
        printf '%s\n' "${FRAGMENTS[@]}"
        env -u KCONFIG_CONFIG ./scripts/kconfig/merge_config.sh -m -O ../kobj "${FRAGMENTS[@]}"

    - name: Make
      shell: bash
      run: |
        cd ${{ inputs.workspace_path }}
        docker run -i --rm \
        --user $(id -u):$(id -g) \
        --workdir="$PWD" \
        -v "$(dirname $PWD)":"$(dirname $PWD)" \
        ${{ inputs.docker_image }} bash -c "
          make O=../kobj olddefconfig
          make O=../kobj -j$(nproc)
          make O=../kobj -j$(nproc) dir-pkg INSTALL_MOD_STRIP=1
        "

    - name: Get Kernel Version
      id: get_version
      shell: bash
      run: |
        cd ${{ inputs.workspace_path }}
        version=$(make kernelversion)
        echo "Kernel Version : $version"
        echo "kernel_version=$version" >> $GITHUB_OUTPUT
