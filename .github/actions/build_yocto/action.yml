---
name: Compile Yocto Build
description: Compile Yocto Build using kas files

inputs:
  workspace_path:
    description: Workspace path
    required: true
  s3_bucket:
    description: S3 bucket name
    required: true
  rootfs:
    description: rootfs name
    required: true
  sha:
    description: SHA of kernel, on which CI will run
    required: true
  cache_dir: 
    description: Cache directory
    required: true
  kas:
    required: true
  branch:
    description: Branch name
    required: true
  base:
    description: base build or tip
    type: string
    required: true
    default: ""
  kernel_yaml:
    description: Kernel Yaml to build
    type: string
    required: true
  pr_list:
    description: meta_qcom_pr list
    type: string
    required: false
    default: ""

outputs:
  artifacts_location:
    value: ${{ steps.upload_artifacts.outputs.s3_location }}
    description: Aws location
  kernel_version:
    value: ${{ steps.get_version.outputs.kernel_version }}
    description: Kernel version built

runs:
  using: 'composite'
  steps:
    - name: Setup Environment
      shell: bash
      run: |
        set -ex

        # use a monthly sstate cache folder
        echo "DL_DIR=${{inputs.cache_dir}}/downloads-1" >> $GITHUB_ENV
        echo "SSTATE_DIR=${{inputs.cache_dir}}/sstate-cache-$(date '+%Y-%m')-1" >> $GITHUB_ENV

        workspace=${{ inputs.workspace_path }}
        s3_bucket=${{ inputs.s3_bucket }}
        rootfs=${{ inputs.rootfs }}
        build_dir="$workspace/../$rootfs"
        sha=${{ inputs.sha }}

        echo "workspace=${{ inputs.workspace_path }}" >> $GITHUB_ENV
        echo "s3_bucket=${{ inputs.s3_bucket }}" >> $GITHUB_ENV
        echo "build_dir=$build_dir" >> $GITHUB_ENV
        echo "sha=${{ inputs.sha }}" >> $GITHUB_ENV
        echo "rootfs=${{ inputs.rootfs }}" >> $GITHUB_ENV
        echo "base=${{ inputs.base }}" >> $GITHUB_ENV

        echo "LOGFILE=${{ github.workspace }}/build-logs.log" >> "$GITHUB_ENV"

        mkdir -p "$build_dir"
        KAS_WORK_DIR="$build_dir/kas"
        CI_YAML_DIR=$KAS_WORK_DIR/meta-qcom/ci
        echo "KAS_WORK_DIR=$KAS_WORK_DIR" >> $GITHUB_ENV
        echo "CI_YAML_DIR=$CI_YAML_DIR" >> $GITHUB_ENV

    - name: Configure AWS
      shell: bash
      run: |
        aws configure set aws_access_key_id "${{ env.AWS_ACCESS_KEY_ID}}" && \
        aws configure set aws_secret_access_key "${{ env.AWS_SECRET_ACCESS_KEY}}" && \
        aws configure set default.region "${{ env.AWS_REGION}}"

    - name: Set meta-qcom Branch name and kernel version
      shell: bash
      run: |
        set -ex
        branch="${{ inputs.branch }}"
        if [ "$branch" == "qcom-6.18.y" ]; then
          kernel_ver="6.18"
          meta_qcom_ref="wrynose"
        else
          kernel_ver="mainline"
          meta_qcom_ref="master"
        fi
        echo "kernel_ver=$kernel_ver" >> $GITHUB_ENV
        echo "meta_qcom_ref=$meta_qcom_ref" >> $GITHUB_ENV

    - name: Set Kernel override
      shell: bash
      run : |
        cd ${{ env.build_dir }}
        aws s3 cp s3://${{ env.s3_bucket }}/meta-qcom/kas_files/${{ env.kernel_ver }}/kernel-override.yml .
        kernel_sha="${{ env.sha }}"
        echo "Kernel SHA : $kernel_sha"
        if [[ "${{ env.kernel_ver }}" == "6.18" ]]; then
          sed -i "s/SRCREV:pn-linux-qcom = \"[^\"]*\"/SRCREV:pn-linux-qcom = \"$kernel_sha\"/" kernel-override.yml
        else
          sed -i "s/SRCREV:pn-linux-qcom-next = \"[^\"]*\"/SRCREV:pn-linux-qcom-next = \"$kernel_sha\"/" kernel-override.yml
        fi
        cat kernel-override.yml

    - name: Download kas-container
      uses: actions/download-artifact@v6
      with:
         name: kas-container
         path: ${{runner.temp}}

    - name: Setting up kas-container
      shell: bash
      run: |
        KAS_CONTAINER=$RUNNER_TEMP/kas-container
        echo "KAS_CONTAINER=$KAS_CONTAINER" >> $GITHUB_ENV
        chmod +x $KAS_CONTAINER

    - name : Get meta-qcom-buildconf Tag
      if: inputs.base != 'tip'
      shell: bash
      run: |
        buildconf_repo="https://x-access-token:${{ env.token }}@github.com/qualcomm-linux/meta-qcom-buildconf.git"
        echo "buildconf_repo=$buildconf_repo" >> $GITHUB_ENV
        # Select ref prefix based on kernel branch
        if [[ "${{ env.base }}" == "tag" ]]; then
          # Use the latest tag matching the prefix (wrynose-* or master-*)
          buildconf_ref="$(git ls-remote --tags "$buildconf_repo" \
                             | awk -F/ '{print $NF}' \
                             | sed 's/\^{}//' \
                             | grep "^${{env.meta_qcom_ref}}-" \
                             | sort -V \
                             | tail -n 1
                           )"
        else
          # base is an explicit tag — use it as-is
          buildconf_ref=${{ env.base }}
        fi
        echo "buildconf_ref=$buildconf_ref" >> $GITHUB_ENV

    - name: Setup Build Workspace
      id: build
      shell: bash
      run: |
        set -ex
        cd ${{ env.build_dir }}
        mkdir kas
        ls -la
        export KAS_WORK_DIR=${{ env.KAS_WORK_DIR }}
        echo $KAS_WORK_DIR
        lock_arg=""
        if [[ "${{ env.base }}" == "tip" ]]; then
          echo "Building from tip"
          git clone https://github.com/qualcomm-linux/meta-qcom.git -b ${{env.meta_qcom_ref}} "${{ env.KAS_WORK_DIR}}/meta-qcom"
          meta_qcom_sha=$(git -C "${{ env.KAS_WORK_DIR}}/meta-qcom" rev-parse HEAD)
          echo $meta_qcom_sha > build_id.txt
          cat build_id.txt

        else
          echo "meta-qcom-buildconf ref : ${{ env.buildconf_ref }}"
          git clone ${{ env.buildconf_repo }} -b  ${{ env.buildconf_ref }}
          $KAS_CONTAINER checkout meta-qcom-buildconf/lock.yml
          cp meta-qcom-buildconf/lock.yml $KAS_WORK_DIR/meta-qcom/ci/lock.yml
          lock_arg=":${{ env.CI_YAML_DIR }}/lock.yml"
        fi
        echo "lock arg : $lock_arg"
        echo "lock_arg=$lock_arg" >> $GITHUB_ENV
        cat kernel-override.yml
        cp kernel-override.yml ${{ env.CI_YAML_DIR }}

    - name: Apply Unmerged meta-qcom PR's
      if: ${{ inputs.pr_list != '' }}
      shell: bash
      run: |
        cd "${{ env.KAS_WORK_DIR}}/meta-qcom"
        echo "Merging meta-qcom PR(s): ${{ inputs.pr_list }}"
        for pr in ${{ inputs.pr_list }}; do
          echo "::group::Merging meta-qcom PR #$pr"
          git fetch --no-tags origin "pull/$pr/head:pr-$pr"

          if ! git merge "pr-$pr" --no-commit; then
            echo "ERROR: Merge conflict while merging PR #$pr. Aborting."
            git merge --abort || true
            exit 1
          fi

          if ! git diff --cached --quiet; then
            git commit -m "Merged qcom-next PR #$pr"
            echo "PR #$pr merged successfully."
          else
            echo "Nothing to commit for PR #$pr (already merged or fast-forwarded)."
          fi
          echo "::endgroup::"
        done

        cat > "${{ env.CI_YAML_DIR }}/meta_qcom_override.yml" <<EOF
        header:
          version: 14
        repos:
          meta-qcom:
            path:
            url:
        EOF
        echo "pr_override_arg=:${{ env.CI_YAML_DIR }}/meta_qcom_override.yml" >> $GITHUB_ENV

    - name: Build
      shell: bash
      run: |
        cd ${{ env.build_dir }}
        echo "In build : lock_arg : ${{ env.lock_arg }}"
        $KAS_CONTAINER build ${{ env.CI_YAML_DIR }}/${{ env.rootfs }}.yml:${{ env.CI_YAML_DIR }}/${{ inputs.kernel_yaml }}.yml:${{ env.CI_YAML_DIR }}/qcom-distro.yml:${{ env.CI_YAML_DIR }}/kernel-override.yml${{ env.lock_arg }}${{ env.pr_override_arg }}

        if [[ "${{ env.kernel_ver }}" == "6.18" ]]; then
          recipe="linux-qcom"
        else
          recipe="linux-qcom-next"
        fi

        raw_ver=$($KAS_CONTAINER shell ${{ env.CI_YAML_DIR }}/${{ env.rootfs }}.yml:${{ env.CI_YAML_DIR }}/${{ inputs.kernel_yaml }}.yml:${{ env.CI_YAML_DIR }}/qcom-distro.yml:${{ env.CI_YAML_DIR }}/kernel-override.yml${{ env.lock_arg }}${{ env.pr_override_arg }} -c "bitbake -e $recipe | grep '^KERNEL_VERSION='" | cut -d'"' -f2)
        echo "raw_kernel_version=$raw_ver" >> $GITHUB_ENV

    - name: Get Kernel Version
      id: get_version
      shell: bash
      run: |
        version=$(echo "${{ env.raw_kernel_version }}" | sed 's/-g[0-9a-f][0-9a-f]*.*//; s/-dirty//')
        echo "Kernel version: $version"
        echo "kernel_version=$version" >> $GITHUB_OUTPUT

    - name: Prepare file list for log upload
      if: always()
      shell: bash
      run: |
        set -ex
        # check if file_list.txt exists, if not create it
        if [ ! -f ${{ github.workspace }}/file_list.txt ]; then
          touch ${{ github.workspace }}/file_list.txt
        fi
        # # echo "${{ github.workspace}}/build-logs.log" >> file_list.txt
        cd ${{ env.build_dir }}/kas/build/tmp/deploy/images/${{ env.rootfs }}/
        ls -la
        LINK="qcom-multimedia-image-${{ env.rootfs }}.rootfs.qcomflash.tar.gz"
        TARGET=$(readlink "$LINK")
        cp "$TARGET" ${{ env.build_dir }}/qcom-multimedia-image-${{ env.rootfs }}.rootfs.qcomflash.tar.gz

        LINK_PROP="qcom-multimedia-proprietary-image-${{ env.rootfs }}.rootfs.qcomflash.tar.gz"
        TARGET_PROP=$(readlink "$LINK_PROP")
        cp "$TARGET_PROP" ${{ env.build_dir }}/qcom-multimedia-proprietary-image-${{ env.rootfs }}.rootfs.qcomflash.tar.gz
        
        echo "${{ env.build_dir }}/qcom-multimedia-image-${{ env.rootfs }}.rootfs.qcomflash.tar.gz" >> ${{ github.workspace }}/file_list.txt
        echo "${{ env.build_dir }}/qcom-multimedia-proprietary-image-${{ env.rootfs }}.rootfs.qcomflash.tar.gz" >> ${{ github.workspace }}/file_list.txt
        cd ${{ env.build_dir }}
        if [ -f build_id.txt ]; then
          echo "${{ env.build_dir }}/build_id.txt" >> ${{ github.workspace }}/file_list.txt
        fi

    - name: Upload artifacts to S3
      if: always()
      id: upload_artifacts
      uses: qualcomm-linux/kernel-config/.github/actions/aws_s3_helper@main
      with:
        s3_bucket: qli-prd-kernel-gh-artifacts
        local_file: ${{ github.workspace }}/file_list.txt
        mode: multi-upload
      env:
        machine: ${{ inputs.rootfs }}_

    - name: Update Summary
      if: always()
      shell: bash
      run: |
        if [ "${{ steps.upload_artifacts.outcome }}" == "success" ]; then
          status="Success"
          emoji=":heavy_check_mark:"
        else
          status="Failure"
          emoji=":x:"
        fi
        echo "### Build completed successfully." >> $GITHUB_STEP_SUMMARY
        echo "- Artifacts upload to AWS s3 location: **$status** $emoji" >> $GITHUB_STEP_SUMMARY
        echo "- Build logs upload to AWS s3 location: **$status** $emoji" >> $GITHUB_STEP_SUMMARY
        if [ $status == "Success" ]; then
          echo "- Check github artifacts for presigned URLs JSON file containing link to the logs and artifacts." >> $GITHUB_STEP_SUMMARY
        fi
