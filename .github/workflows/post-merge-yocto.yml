---
name: post_merge_yocto
run-name: Compile Yocto Build

on:
  workflow_call:
    inputs:
      sha:
        description: Head sha on which Build needs to be triggered
        type: string
        required: true
      ref:
        description: Target branch
        type: string
        required: true
      repo:
        description: Target repository
        type: string
        required: true
      base:
        description: base build or tip
        type: string
        default: tip
        required: true

jobs:
  init-status:
    name: Initialize Status
    runs-on: ubuntu-latest
    steps:
      - name: Set Status
        uses: qualcomm-linux/kernel-config/.github/actions/workflow_status@main
        with:
          sha: ${{ inputs.sha }}
          action_mode: start
          check_name: "Yocto Build Generation"
          repo: ${{ inputs.repo }}
          GH_TOKEN: ${{ secrets.PAT }}

  init:
    name: Initialize Workflow
    needs: init-status
    runs-on: ubuntu-latest
    steps:
      - name: Update Summary
        run: |
          echo "SHA : ${{ inputs.ref }}"
          echo "## Yocto Build Generation" >> $GITHUB_STEP_SUMMARY
          echo "- Pull Request Number: \`${{ inputs.pr || 'Nightly Build on Tip' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Head Commit SHA: \`${{ inputs.sha || 'N/A' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Target Branch: \`${{ inputs.ref || 'N/A' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Target Repository: \`${{ inputs.repo || 'N/A' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Base: \`${{ inputs.base || 'N/A' }}\`" >> $GITHUB_STEP_SUMMARY

  loading:
    name: Load Parameters
    needs: init-status
    uses: qualcomm-linux/kernel-config/.github/workflows/loading.yml@main
    secrets: inherit
    with:
      branch: ${{ inputs.ref }}

  build_yocto:
    name: Build Yocto
    needs: [init-status, init, loading]
    uses: qualcomm-linux/kernel-config/.github/workflows/build-yocto.yml@main
    secrets: inherit
    with:
      repo: ${{ inputs.repo || 'qualcomm-linux/kernel' }}
      ref: ${{ inputs.ref || 'qcom-next-staging' }}
      SHA: ${{ inputs.sha }}
      rootfs_matrix: ${{ needs.loading.outputs.rootfs_matrix }}
      base: ${{ inputs.base }}

  check_run:
    runs-on: ubuntu-latest
    needs: [init-status, init, loading, build_yocto]
    steps:
      - name: Post check run
        uses: qualcomm-linux/kernel-config/.github/actions/check_run@main
        with:
          sha: ${{ inputs.sha }}
          repo: ${{ inputs.repo }}
          s3_location: ${{ needs.build_yocto.outputs.artifacts_location }}
          workflow_name: " for ${{ github.workflow }}"
          APPID: ${{ secrets.APPID }}
          PVK: ${{ secrets.PVK }}

  test:
    needs: [init-status, loading, build_yocto]
    uses: qualcomm-linux/kernel-config/.github/workflows/test.yml@main
    secrets: inherit
    with:
      docker_image: kmake-image:ver.1.0
      rootfs_matrix: ${{ needs.loading.outputs.rootfs_matrix }}
      kernel_version: ${{ needs.build_yocto.outputs.kernel_version }}
      commit_SHA: ${{ inputs.sha }}
      branch: ${{ inputs.ref }}
      pr_number: "tip"
      flash_type: "qdl"
      build_type: "yocto"


  nightly_report:
    name: Nightly Test Report
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Download all test JSON artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Tests-*
          path: all-json
          merge-multiple: true

      - name: Download all job info artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: job_info_*
          path: job-info
          merge-multiple: true

      - name: Generate report
        run: |
          set -e
          INPUT_DIR="all-json"

          sha="${{ inputs.sha }}"
          short_sha="${sha:0:7}"
          commit_url="https://github.com/${{ inputs.repo }}/commit/${sha}"
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          {
            echo "# Nightly LAVA Test Report"
            echo ""
            echo "| | |"
            echo "| --- | --- |"
            echo "| **Branch** | \`${{ inputs.ref }}\` |"
            echo "| **Commit** | [\`${short_sha}\`](${commit_url}) |"
            echo "| **Run** | [${run_url}](${run_url}) |"
            echo ""

            if ls job-info/*.md 1>/dev/null 2>&1; then
              echo "## LAVA Jobs"
              cat job-info/*.md
              echo ""
            fi

            mapfile -t FILES < <(ls "$INPUT_DIR"/*.json 2>/dev/null || true)
            if [ ${#FILES[@]} -gt 0 ]; then
              echo "## Test Matrix"
              echo ""

              TARGETS=()
              for f in "${FILES[@]}"; do
                TARGETS+=("$(basename "$f" .json | sed 's/^Tests-//')")
              done

              TESTS=$(jq -r '.[].name' "${FILES[@]}" | sort -u)

              printf "| Test Case "
              for t in "${TARGETS[@]}"; do printf "| %s " "$t"; done
              printf "|
"

              printf "| --- "
              for _ in "${TARGETS[@]}"; do printf "| :---: "; done
              printf "|
"

              while IFS= read -r test; do
                printf "| %s " "$test"
                for t in "${TARGETS[@]}"; do
                  res=$(jq -r --arg n "$test" '.[] | select(.name==$n) | .result'                     "$INPUT_DIR/Tests-${t}.json" 2>/dev/null || true)
                  case "$res" in
                    pass)  cell="✅" ;;
                    fail)  cell="❌" ;;
                    skip)  cell="⚠️" ;;
                    error) cell="⛔" ;;
                    *)     cell="➖" ;;
                  esac
                  printf "| %s " "$cell"
                done
                printf "|
"
              done <<< "$TESTS"

              echo ""
              echo "## Summary"
              echo ""
              printf "| Target | ✅ Pass | ❌ Fail | ⚠️ Skip | Total |
"
              printf "| --- | :---: | :---: | :---: | :---: |
"
              for t in "${TARGETS[@]}"; do
                f="$INPUT_DIR/Tests-${t}.json"
                total=$(jq 'length' "$f")
                if [ "$total" -eq 0 ]; then
                  printf "| %s | ➖ | ➖ | ➖ | N/A (Incomplete) |\n" "$t"
                else
                  pass=$(jq '[.[] | select(.result=="pass")] | length' "$f")
                  fail=$(jq '[.[] | select(.result=="fail")] | length' "$f")
                  skip=$(jq '[.[] | select(.result=="skip")] | length' "$f")
                  printf "| %s | %s | %s | %s | %s |\n" "$t" "$pass" "$fail" "$skip" "$total"
                fi
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  final-status:
    name: Finalize Status
    if: always()
    runs-on: ubuntu-latest
    needs: [build_yocto, check_run, test]
    steps:
      - name: Set final status
        uses: qualcomm-linux/kernel-config/.github/actions/workflow_status@main
        with:
          sha: ${{ inputs.sha }}
          action_mode: ${{ needs.build_yocto.result }}
          check_name: "Yocto Build Generation"
          repo: ${{ inputs.repo }}
          GH_TOKEN: ${{ secrets.PAT }}
